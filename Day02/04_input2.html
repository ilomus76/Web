<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>input element2</title>

    </head>
    <body>
        <!-- 여러중 입력 -->
         <!-- 글씨 영역 -->
         <!-- <textarea name="" id=""></textarea> -->
        <textarea cols="40" rows="5"></textarea>
        <!-- 크기 조정 됨 . css에서 안되게 할수 있음.  -->
        <hr>
        <!-- 콤보박스 용 요소 -->
         <!-- name : 변수명 -->
        <!-- <select name="" id=""></select> -->
         <select >
            <option value="aa">사과</option>
            <option value="bb">바나나</option>
            <option value="cc">오렌지</option>

         </select>


         <!-- 옵션그룹활용 -->
            <select >
                <optgroup label="중식">
                    <option value="a">짜장면</option>
                    <option value="b">짬뽕</option>
                    <option value="c">볶음밥</option>
                </optgroup>
                <optgroup label="일식">
                    <option value="">초밥</option>
                    <option value="">회</option>
                    <option value="">덮밥</option>
                </optgroup>

            </select>
            <hr>

            <fieldset>
                <legend>필드셋의 제목(개인정보)</legend>
                <label>이름: <input type="text" name="name"></label>
                <label>나이: <input type="text" name="age"></label>
            </fieldset>
            <hr>

            <!-- 파일선택하기 -->
            <input type="file" accept="image/png">   
            <!-- 위는 single choice만 됨 -->
             <hr>
             <!-- 여러개의 파일선택 -->
             <input type="file" accept="image/*" multiple="multiple">

             <!-- 비교적 최근에(2010년도) 새로 추가된 type들  -->
              <form action="">
                <!-- 날짜 선택 관련 타입들 -->
                 <input type="date"> <br>
                 <input type="datetime"> <br><!--지원안됨 왜? 나라마다 시간대가 달라서...-->
                 <input type="datetime-local">
                 <input type="month"> <!--월만 선택-->
                 <input type="week">
                 <hr>

                 <!-- 색상 선택창 -->
                 <input type="color"><br>
                 <!-- 이메일 입력박스 [ 모바일에서 키패드의 모양이 달라짐. 소프트키보드.. 숫자,, 글자,, 또는 @ 가 들어간 자판... 이걸 사용하면 @가 들어가는 자판으로 들어감. 모바일에서 ] -->
                 <input type="email"><br>

                 <!-- 전화번호 [ 모바일에서 키패드의 모양이 달라짐] 숫자키패드와 다른 숫자와 영문으로 된 자판이 나옴. -->
                 <input type="tel"><br>
                 <!-- 검색어 입력박스[ 글씨 쓰면 우측끝에 삭제 버튼X이 우측 끝에 표시됨] -->
                 <input type="search"><br>

                 <!-- 범위지정 요소 -->
                  <input type="range" min="0" max="10" step="2" value="4">

                  <!-- 숫자선택 요소 -->
                  <input type="number" min="210" max="300" step="10" value="230">


                  <!-- url 입력 타입 [모바일에서 키보드 모양 다름.. 가끔 .com 이라는 칸이 나오게 하는것]-->
                   <input type="url">

                   <!-- 여기까지가 팀 버너스리가 만들 것 이외에 새로 생긴것 -->
                    <hr>


                <!-- 비교적 최근에 새로이 추가된 input의 속성들 -->
                 <form action="./aaa.php">
                    <!-- 힌트글씨 표시 -->
                    <input type="text" placeholder="이름을 입력하세요"><br>

                    <!-- 반드시 입력해야 하는 요소에 적용하는 속성 (form 요소안에서만 작동)-->
                     <!-- <input type="text" required="required"> -->
                     <input type="text" required><br>

                     <!-- 글씨는 보이지만 수정 불가 -->
                      <!-- <input type="text" readonly="readonly"> -->
                      <input type="text" readonly value="sam"><br>


                      <!-- 페이지가 로딩될때(처음에 열릴때) 가장 먼저 포커스를 받고 싶다면 -->
                      <!-- 선택하는것을 포커스라고 함. 처음에 활성화 되는것 -->
                      <input type="text" autofocus><br>  
                        <!-- autofocus가 위에도 있다면 위에 있는것을 먼저 함.  -->

                        <!-- 최대 입력 글자수 제한 -->
                        <input type="text" maxlength="5"><br>

                        <!-- 자동 완성 기능 -->
                         <input type="text" autocomplete list="datas">
                         <!-- 자동완성할 리스트를 지정 -->
                          <datalist id="datas"> 
                            <option value="canada" label="캐나다"></option>
                            <option value="china" label="중국"></option>
                            <option value="korea" label="한국"></option>
                          </datalist>

                     <hr>
                     <input type="submit">
                 </form>






              </form>

        
    </body>
</html>
