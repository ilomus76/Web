<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>input element</title> 

    </head>
    <body>
        <!-- - input 요소의 다양한 type 알아보기 -->
         <!-- 1. 한줄 입력 요소. 너비를 넘어가면 자동 스크롤 -->
        <input type="text" size="40"> <br>
        <!-- 엔터를 눌러도 줄이 바뀌지 않고 입력을 계속 넣어도 계속 들어감... , 글자 사이즈 지정 size -->
         <!-- 2. 비밀번호 요소  -->
          <input type="password">
          <!-- 인라인요소,, br로 줄바뀜 --> 
           <!-- 텍스트를 가져왔기 때문에 계속 들어가고 엔터쳐도 줄이 안바뀜 -->

           <hr>
           <!-- 3. 라이도 버튼 ( single choice) -->
            라디오버튼: 
            <!-- 글자 쓰는 기능 없음. 그냥 표시되는 값이지 서버로 날아가는 것은 value임 -->
             <!-- 서버에 전송되는 값은 input요소의 value 속성값이 전송됨.  -->
              <!-- (중요) 두 라디오버튼이 서러 한 그룹으로 인식하도록 name 속성이 같아야 함.  -->
               <!-- 값을 전달할때 변수이름을 같게 해줘야 함.  -->
            <input type="radio" value="aaa" name="rg"> aaa  <!--표시에 사용되는 문자는 단지 보여주기이다. -->
            <input type="radio" value="bbb" name="rg"> bbb
            ccc<input type="radio" value="bbb" name="rg"> 
            <!-- 글씨 선택하면 선택이 되지 않음. -->
            <hr>

            <!-- label 요소와 함께 사용하면 글씨를 눌렀을때 선택이 됨. -->
            <input type="radio" value="male" name="gender" id="rb1">
            <label for="rb1">남성</label> 
            <!-- 레디오버튼 1과 연관된 레이블 -->
            <input type="radio" value="female" name="gender" id="rb2" checked="checked">
            <!-- <input type="radio" value="female" name="gender" id="rb2" checked> -->
            <label for="rb2">여성</label>
             <!-- 레디오버튼 2과 연관된 레이블 -->
              <hr>


            <!-- 4. 체크박스 (multiple choice) : 여러개를 선택할 수 있음. -->
             <!-- 위의 버튼은 2개인데 4줄이 들어감.  -->
              <!-- label 요소안에 input요소는 넣으면 for 속성 부여된 효과를 볼수 있음. -->

            <label><input type="checkbox" value="apple" name="fruits" checked>사과</label>
            <label><input type="checkbox" value="banana" name="fruits" >바나나</label>
            <label><input type="checkbox" value="orange" name="fruits" checked>오렌지</label>  
            <!-- 글씨만 눌러도 선택이 됨.  -->
             <!-- fruits 라는 이름의 식별자(변수)에 선택된 값들(리스트,배열)이 서버로 전송됨. 여러개의 값이 변수로 전달됨.-->
            <hr>

            <!-- 5. 서버 전송을 요청하는 버튼 타입 submit [항상 form 요소와 함께 사용해야 함.] -->
             <!-- form : 양식 -->
              <!-- submit 타입의 버튼을 클릭하면 form 요소의 action 속성에 지정된 서버프로그램이 실행됨. -->
            <form action="./aaa.php">
                <!-- <form action="./aaa.php" method="get"> -->
                <input type="text" name="title">
                <input type="text" name="message">
                <input type="submit" value="보내기">
                <!-- 6 작성내용 모듀 삭제 (초기화) -->
                <input type="reset" value="취소">


                <!-- 7.이미지를 이용하여 submit 버튼 구현 -->
                <input type="image" src="./image/sydney.jpg" width="50">
            </form>
            <!-- 서버 프로그랭을 php로 하고 나중에 python으로 할거다.... 서버프로그램. -->
             <!-- personal homepage에서 나옴. pyp -->

             <hr>
             <!-- 8. input 요소의 버튼 타입 -->
              <input type="button" value="중복체크" onclick="alert('중복된 id입니다.')">

              <!-- 9.button 요소 -->
               <button onclick="alert('눌렀다')">눌러주세요</button>
               <!-- 버튼 요소는 안에 .. 글씨가 아닌 다른 요소가 놓여질 수 있음. -->
                <button>
                    <img src="./image/sydney.jpg" alt="시드니 이미지 버튼" width="50">
                </button>

        
    </body>
</html>
