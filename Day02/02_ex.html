<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>element ex</title>
    </head>
    <body>
        <!-- 1. audio 요소 -->
         <audio src="./audio/old_pop.mp3" controls="controls">오디오 태그가 지원되지 않으면 보이는 글씨</audio>
         <!-- 브라우저 마다 지원가능한 음원의 유형이 다르기에.. 대응하기!! -->
          <!-- 속성 이름과 값이 같은때 그냥 이름만 쓰면 됨 -->
          <audio controls>
            <source src="./audio/old_pop.mp3", type="audio/mp3">
            <!-- type은 MIME ( 마임 타입 )을 지정 , multip internet mail , video /확장자. audio/화장자,,  이런 것이 마임 타입... -->

            <!-- online converter : online converter -> audio converter   , -->
             <!-- 미디어파일 무료 변환 사이트 online-converter.com -->
             <source src="./audio/old_pop.mp3", type="audio/mp3">
             <source src="./audio/old_pop.wav", type="audio/wav">
             <source src="./audio/old_pop.ogg", type="audio/ogg">
          </audio>
          <hr>
          <!-- 2.비디오 요소 -->
           <video controls>
            <source src="./video/movie.ogv" type="video/ogg">
            <!-- 확장명은 ogg로 ... -->
           </video>
           <video controls width="480" height="320" poster="./image/paris.jpg" autoplay muted>
            <!-- 사이즈 조정 안하면 단위는 픽셀 단위 , 화면이 까만색임. 그래서 미리 보여주는 이미지로 poster 설정. autoply muted를 넣으면 바로 자동 플레이됨. -->
             <!-- autoply muted와 함께 있어야 ... 자동 재생 가능함... 모발일에서 이 기능이 활성화되면 네트워비용이 커짐.. -->
            <source src="./video/trailer.mp4" type="video/mp4">
            <source src="./video/trailer.webm" type="video/webm">
            <source src="./video/trailer.ogv" type="video/ogg">
           </video>

           <!-- 예전에 .. 미디어파일 전용 요소가 없을때 사용하던 요소 [embed, object ] -->
            <!-- embed가 더 오래됨 object보다 -->
           <embed src="./SQL.pdf" type="application/pdf"><!--가장 오래전 요소--> 
        
            <hr>
            <object data="./SQL.pdf" type="application/pdf" width="50%" height="300"></object>
            <hr>
            <!-- 현재는 embed, object ==> iframe ( inline frame) 으로 사용하는 것을 권장 -->
            <!-- 아직도 embed, object 의 흔적이 많이 남아 있어 배움.  -->

            <!-- 3교시 -->
            <!-- 잘 만드는 것은 AI 더 잘함. 하지만 분석을 해야함.  -->
            <!-- 3. iframe [ inline frame] : 데이타 분석시 이것때문에 골치아파진다... 페이지 않에 또 페이지가 있기 때문 -->
            <!-- 다른 HTML문서를 내 문서안에서 보여주기 -->
             <!-- 1)상대 경로 -->
            <iframe src="./01_table.html" ></iframe> <!--1번 연습한걸 보겠다-->
            <!-- 2) 절대경로 -->
             <iframe src="http://mbca2025aix.dothome.co.kr/index.html" frameborder="0"></iframe>
             <iframe src="http://mbca2025aix.dothome.co.kr" frameborder="0"></iframe>  <!--index.html 이 없어도 똑같다.-->
             <iframe src="https://ic.mbccomputer.co.kr/front/hrd/types/3?gad_source=1&gad_campaignid=23729278704&gbraid=0AAAABBhzriDDEWevhCOjBg_er5Wg0vUB1&gclid=CjwKCAjw5s_QBhAdEiwADD_gBiaUGJq0IVzWEqnoF2_FYN49rSgnk0QeZdG_cFFBqmFmUTsc_vpoYBoC7WwQAvD_BwE" frameborder="0"></iframe>
             <!-- 인라인요소,, 블럭요소가 아님.  -->

             <hr>
             <!-- 3) 하이퍼링크 요소 <a> 에 의해 열리는 페이지를 iframe 안에 열리도록....  -->
            <iframe src="" frameborder="2" name="aaa" width="480"></iframe>  <!--보더 두께는 기본이 1-->
            <a href="https://www.daum.net" target="aaa">다음 포털 사이트</a>  
            <!-- 남성복, 여성복 클릭하면 그 해당 화면이 iframe으로 넣음. 지금은 애이작스를 사용... 리소스를 너무 많이 잡아서.. -->

            <!-- iframe 이 열지 못하는 사이트도 존재함.. 보통 동적으로 화면을 구성하는 사이트들(요즘 많은 사이트가 이렇게 만들고 있음.) -->
            <!-- 프로그램으로 사이트를 만드는 곳인 동적 사이트는 못함. -->
            <a href="https://www.naver.com" target="aaa">네이버 포털 사이트</a>
            <!-- 서버사이트 렌더링이랑 동적 렌더링을 하기 힘듦.  -->
            <!-- 많은 변화가 있는 사이트는 HTML로 하기 보다 프로그램밍으로 통해 작성하고 있는데 이것을 동적 화면 사이트를 처리하기 힘듬. 에이작스를 많이 사용 .. 요즘.. -->


            <!-- pdf 파일 뷰어도 iframe 을 권장함.  -->
            <iframe src="./SQL.pdf" frameborder="0" width="50%" height="300"></iframe>
            <hr>

            <!-- 4. 화면의 일부 영역을 구분하는 용도의 요소 2개 : div , span -->
            <div style="background-color: yellow;border: 2px solid red;padding-left: 10px;">
                <!-- css 의 style  , block 요소여서 라인을 다 먹음. -->
                <h2>TITLE</h2>
                <p>This is message.</p> 
                <!-- 들여쓰기 잘해라.. -->
            </div>
            <!-- 요만큼이라는 감만 잡아라...  -->
            <!-- div 의 블럭요소 특징  -->
            <p>
                <!-- 위아래 여백이 자동으로 생성. -->
                 안녕하세요. 나는 <div style="color: blue;">홍길동</div>입니다.
                 <!-- 블럭 요소는 줄을 자기가 다 먹음. 그래서 중간에 삽입되어도 그 한칸을 다 먹기 때문에 줄이 바뀜. 그래서 span이 나옴.  -->
                 <!-- div : 요만큼... -->
            </p>
            <!-- span 인라인요소 특징 -->
             <p>
                <!-- 위아래 여백이 자동으로 생성. -->
                 안녕하세요. 나는 <span style="color: blue;">홍길동</span>입니다.
             </p>
            <hr>
            <!-- div요소는 실제 현업의 프론트엔드( 웹페이지 만드는 것. 뒷단을 백엔드)화면을 개발할때 가장 많이 사용함.  -->
            <!-- 웹 페이지를 만들때 보통 먼저 페이지의 구조를 구성하는 것부터 시작함. -->
            <!-- 이때 div를 사용함.  header/main/ footer -->

              <div id="header" style="background-color: yellow;">앱 상단 로고 영역</div>
              <div id="main" style="background-color: green;height: 400px">메인영역</div>
              <div id="footer" style="background-color: blue;">앱 하단 바 영역</div>


    </body>
</html>
