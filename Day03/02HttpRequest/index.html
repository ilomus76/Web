<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>http request</title>
    </head>
    <body>
        <h2>HTTP REQUEST TEST</h2>
        <!-- form 요소 : anchor 요소처럼 다른 문서를 실행하지만 데이타를 전달할 수 있고.. 이동하기 위한 별도의 input요소가 필요함. (백앤드 프로그램(php)을 실행하고 데이타를 전달하는 요소) -->
         <!-- 1. GET 방식 : 보낼 데이터를 URL 뒤에 ? 후 붙여서 전달하는 방식 -->
          <form action="./aaa.php" method="get">
            <input type="text" placeholder="제목 입력" name="title">
            <input type="text" placeholder="메세지 입력" name="msg">
            <input type="submit">
          </form>
          <!-- submit 을 클릭하면 aaa.php가 동작을 하고 여기에 title, msg라는 name 식별자를 통해서 Get 방식으로 메세지가 날라간다라는 뜻.  -->
          <!-- 이때 제출 버튼을 누르는 것은 page 주소를 바꾸는 개념이다...  -->
          <!-- 내 피시에서 실행하면 인터프리터가 없어 php코드가 다 보이지만 서버에 올라가서 사용자의 응답을 받는 순간 실제로 반응하는 코드의 응답이 보일것이다. -->

          <hr>
          <!-- 5교시 -->
          <!-- 2. post 방식 : 데이터를 숨겨서 보내는 방식,  -->
          
          <fieldset>
            <legend>POST method</legend>
            <!-- <form action="./bbb.php" method="get"> -->
            <form action="./bbb.php" method="post">
            <label for="in1">아이디:</label>
            <input type="text" name="user_id" id="in1">  <!--인라인요소 -->
            <br>  
            <!-- 라벨을 선택해도 인풋에 들어감.  -->

            <label >비밀번호: <input type="password" name="user_pw"></label>
            <br>
            <p>
                성별: 
                <!-- br 태그 없으면 줄바꿈 안보인다.  -->
                 <label><input type="radio" name="gender" value="male">남성</label>
                 <!-- 남성은 레이블거라서 인풋으로 가려면 value 에 넣어야 함. -->
                <label ><input type="radio" name="gender" value="female" checked>여성</label>
            </p>

            <p>
                당신이 좋아하는 과일을 모두 선택하세요. <br>
                <label><input type="checkbox" name="fruits[]" value="apple">사과</label>&nbsp;&nbsp;
                <label><input type="checkbox" name="fruits[]" value="banana">바나나</label>&nbsp;&nbsp;
                <label><input type="checkbox" name="fruits[]" value="orange">오렌지</label>&nbsp;&nbsp;
                <!-- php 일경우 배열일 경우 name 에서 fruits 라고 하면 안되고 fruits[]라고 해야 3개가 다 날라가고 아니면 마지막 하나가 날라감.  -->

            </p>

            <p>
                메세지: <br>
                <textarea name="msg" cols="40" rows="5"></textarea>
                <!-- name 을 서버로 보낸다... -->
            </p>
            <div>
                <select name="brand">
                    <optgroup label="자동차 브랜드">
                        <option value="현대">현대</option>
                        <option value="기아" selected>기아
                        <option value="KGM">KGM</option>
                        </option>

                    </optgroup>
                </select>
            </div>

            <hr>
            <input type="submit" value="서버전송">
            <input type="reset" value="작성취소">
          </form>
          </fieldset>

          <!-- 총  -->
    </body>
</html>
