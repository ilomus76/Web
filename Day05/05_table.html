<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>table style</title>
        <!-- 내부 스타일시트 -->
        <style>
            table{
                width: 300px;
                border: 2px solid black;
                /* 내부실선이 2줄로 그려지는 것이 싫다면 .. 두선을 합치기 */
                border-collapse: collapse; 
                /* collapse : 문어트리다.. separate : 분리하다. */

                /* 안에 있는 모든 것들의 수평정렬을 가운데로... */
                text-align:center;
            }
            th,td{border: 1px solid black;padding: 10px 5px;} 
            /* 위 아래 여백 10px 좌우여백 5px */

            /* 제목줄 칸들에 배경색 지정 */
            th{background-color: green;color:white}

            /* 짝수줄 만 별도의 배경색 지정 */
            tr:nth-child(2n){background-color: gainsboro;}

            /* 첫번째 칸들의 너비를 지정 */
            td:first-child{width: 40%}

            /* 제목중의 아래 경계선을 적색으로.. */
            th{border-bottom: 1.5px double red;}

            /* 직접 만들지는 않았지만 ... 그래서 보이지는 않지만... 실제 table 안에 존재하는 자식요소 tbody 확인! */
            table>:nth-child(1){border: 10px solid blue;}


            /* table -> tbody -> tr -> th/td , 즉 table은 자식이 하나이다.. 그런데 또 있다.. theader , tbody , tfooter 가 또 있다.*/
            /* 안쓰면 기본이 tbody임. */


            /* 그래서 보통 테이블 작업할때는 자식선택자 대신 자손선택자를 권장함. */
            table>tr{color:red;} /*대상이 없음.*/ 
            table tr{color:pink;}  /* tr 아래의 자식/자손에게도 색이 다 핑크로 부여됨 하지만 th가 위에서 스타일이 지정되어 제목줄이 안됨.*/
            table th{color:pink}  /*이것은 table의 자손을 핑크로 한거라서 위에서 th의 속성을 덮어 쓰지만 위에서는 그렇지 않다. 그래서 상속이 중요함. */
            /* 피그마 설계도면을 보고 퍼블리서가 해야 할일... */

            /* 같은 태그는 순서가 마지막게 적용이지만 자식의 것은 셋팅을 했더라도 그 속성이 적용이 된다. */

            /* 수행과제 */
            /* 책. chapter6 ~ chapter7 까지 모두 완료 */
            /* 수행과제 */
            /* 1.책 읽고 예제 모두 따라 써보기.. */
            /* 2.각 챕터의 되새김 문제..를 풀어보기.. */


        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>이름</th>
                <th>이메일</th>
            </tr>
            <tr>
                <td>김철수</td>
                <td>aaa@gmail.com</td>
            </tr>
            <tr>                 
                <td>손흥민</td>
                <td>bbb@gmail.com</td>
            </tr>
             <tr>                 
                <td>김민재</td>
                <td>ccc@gmail.com</td>
            </tr>
             <tr>                 
                <td>이강인</td>
                <td>ddd@gmail.com</td>
            </tr>
            
        </table>
    </body>
</html>
