<!-- open in b -->

<!DOCTYPE html> 
<!-- empty element -->   
<html> 
    <!-- 1. 화면에 보이지 않는 영역. (주소줄 영역) 웹문서를 설명하는 내용들 작성 ..화면을 만들때 첫번째 영역, 들여쓰기 권장 -->
    <head>
        <!-- 하나의 .html 문서안에 1개만 적용됨.. [먼저 써있는 것] -->
        <title>page1</title>
        <style>
            p{color: red;}
        </style>

    </head>
    <!-- 2. 브라우저의 화면 영역 -->
    <body>
        <p>Hello Web</p>
        <!--웹브로우저로 열자 ,크롬으로 -->
        
    </body>
</html>


<!-- 프로그램이 아니라 -->
<!DOCTYPE html>
<html>
    <head>
        <title>page2</title>
        <style>
            p{color:blue}
        </style>

    </head>

        <p>nice to meet you.</p>

    </body>
</html>
