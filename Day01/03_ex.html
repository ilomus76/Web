<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>03 ex</title>
    </head>
    <body>
        <!-- 1. 리스트 : 대량의 데이타를 보여주는 -->
         <ul>
            <li>aaa</li>
            <li>bbb</li>
            <li>ccc</li>
         </ul>
         <ol>
            <li>aaa</li>
            <li>bbb</li>
            <li>ccc</li>
         </ol>
         <dl>
            <dt>aaa</dt>
            <dd>aaa는 좋습니다.</dd>
            <dt>bbb</dt>
            <dd>bbb는 그저 그래요</dd>
            <dt>ccc</dt>
            <dd>ccc는 나빠요</dd>
         </dl>
         <hr>
         <!-- 2. 하이퍼 링크 : 하이퍼 : 저넘어로  하이퍼링크 anchor 요소(인라인요소 - 공간이 있다면 옆으로 배치) -->
         <!--  블럭 요소 : 나혼자 한줄 다 먹을거야... 옆에 공간있어도 오지마 . h1 ~h6, p, pre , hr , ul ol dl li, dt ,dd-->
         <!-- 인라인 요소 : 나혼자 안먹고 한줄에 여러 공간가능... 대표 a (anchor ) -->
          <!-- 1) 절대경로  -->
          <a href="https://www.naver.com">네이버</a>
          <br>
          <a href="https://www.google.com" target="_blank">구글</a> 
          <br>
          <!-- 상대경로(현재위치 기준으로) 지정으로 파일 링크 가능 -->
          <a href="./01_ex.html" target="_self">01실습 웹문서 열기</a>
          <br>
          <!-- 3) 현재 html 문서안에서 특정 위치로 이동 [ id 속성 사용] -->
          <!-- #help : id가 help인곳  -->
          <a href="#help">도움말 위치로 이동</a>
          <hr>
          <h3 id="help">도움말</h3>
          <!-- 줄바꾸기 위해서 매번 br 태그 사용하기 보다는.. (간격도 없음...) 단락요소로 줄바꾸는 것이 보기 좋아요 -->
           <p><a href="">aaa</a></p>
           <p><a href="">bbb</a></p>

           <!-- 리스트의 요소로 링크들을 배치할 수 있음. -->
            <ul>
                <li><a href="">네이버</a></li>
                <li><a href="">다음</a></li>
                <li><a href="">구글</a></li>
            </ul>
            <!-- href 에 .html 문서외에도 링크를 연결할 수 있음. -->
             <p><a href="http://mbca2025aix.dothome.co.kr/download/moana.jpg">이미지 링크</a></p>
             <!-- 무료서버임. 우리만의 서버를 만들 수 있음.  -->

             <!-- 브라우저가 보여주지 못하는 문서를 링크하면?? 자동 다운로드 됨 -->
              <p><a href="http://mbca2025aix.dothome.co.kr/download/Fonts.zip">압축문서 다운로드</a></p>
              <p><a href="http://mbca2025aix.dothome.co.kr/download/공모전.hwp">한글문서 다운로드</a></p>

              <!-- 이메일 주소를 링크하면.. 이메일앱이 실행됨, 컴퓨터에서 실행되고 핸드폰에서는 이게 동작함.  -->
               <p><a href="mailto:aaaa@gmail.com">aaa@gmail.com</a></p>  
               <!-- mailto: 를 스키마라고 함. 이메일 보낼때 사용 -->
            <br>
            <!-- 3. 이미지를 보여주는 요소 -->
             <img src="http://mbca2025aix.dothome.co.kr/download/moana.jpg" alt="모아나 이미지">
             <!-- 상대주소 , 이미지가 엄청 크게 나옴. -->
            <!-- img는 인라인 요소이다. 그래서 옆에 보인다. 창을 줄이면 내려감. width만 쓰면 여기에 맞게 height가 조정됨   -->
             <img src="./image/newyork.jpg" alt="상대경로 이미지" width="200" height="150" border="2">
             <!-- 화면의 50% 로 줌. -->
             <img src="./image/paris.jpg" alt="파리 이미지" width="50%">
             <img src="aaa.jpg" alt="이미지가 없을때 보여질 대체글씨">

             <!-- img + anchor : image를 누르면 점프하는 기능-->
              <a href="./image/sydney.jpg"><img src="./image/sydney.jpg" alt="시드니 이미지" width="200"></a>

        <!-- 수행과제 -->
        <!-- [슬라이드 자료 chapter2 32,33 커피전문점 홈페이지 , 사진은 커피사진 인터넷에서 다운받아라. .html 1개 문서 ] -->
        <!-- [슬라이드 자료 chapter2 34~37 썸네일 사진 ㄹ , 사진은 커피사진 인터넷에서 다운받아라. .html 3개 문서] -->

</html>
