<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>file upload ex</title>
    </head>
    <body>
        <h2>파일 업로드 페이지</h2>
        <!-- 서버로 보내는 요소 -->
        <form action="./bbb.php" method="post" enctype="multipart/form-data">
            <!-- 이미지는 url 뒤에 붙일 수 없음 그래서 무조건 post 방식 -->
            <!-- 파일을 전송할때는 key=value방식이 아니라 다른 방식으로 보내야함.. 그래서..... encoding 의 text/plain 아무것도 없는 아무 서식없는 방식... 즉 sam1234 로 보내는 것... 이 방식은 안씀. -->
            <!-- www.form urlencoded 를 이용하겠다고 함... name = sam & pw=1 양식.. 이것이 기본으로 지정됨.... key=value 방식...  즉 택배 박스 박스.. 일반포장... 박스포장, 포장없음.. -->
            <!-- 여러종류등... mulipart ,, 글씨가 아닌 여러 종류... 글씨도 포함...  -->
            
            <input type="file" name="img1">
            <input type="submit" value="파일 전송">
            
            </form>
    </body>
</html>
