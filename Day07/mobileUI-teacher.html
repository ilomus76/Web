<!-- 무료 아이콘 이미지 제공 사이트 : flaticon -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobile ui</title>

    <!-- 외부스타일시트 -->
    <link rel="stylesheet" href="./mobileUI.css">
</head>
<body>

    <div id="container">
        <div class="toolbar">
            <img class="toolbar-img" src="./image/arrow.png" alt="back arrow">
            <button class="toolbar-btn">문의하기</button>
        </div>
        <h2>
            <span>2026년 기준으로</span> 본인이 해당하는 조건이 잇다면 모두 골라주세요.
        </h2>

        <div class="option-container">
            <div class="option">
                <img src="./image/diamond-ring.png" alt="배우자">
                <p>배우자가 있어요</p>
            </div>
            <div class="option">
                <img src="./image/diamond-ring.png" alt="세대주">
                <p>주민등록상 세대주예요</p>
            </div>
            <div class="option">
                <img src="./image/diamond-ring.png" alt="장애인">
                <p>장애인 이예요</p>
            </div>
            <div class="option">
                <img src="./image/diamond-ring.png" alt="가족 중 장애인">
                <p>가족중에 장애인이 있어요</p>
            </div>
            <div class="option">
                <img src="./image/diamond-ring.png" alt="위탁 아동">
                <p>위탁아동이 있어요</p>
            </div>            
        </div>

        <button class="next-btn">다음</button>        
    </div>

    
</body>
</html>
