<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부모요소 사이즈에 대한 </title>
    <style>
        *{border: 1px dotted red}
    </style>
</head>
<body>
        <!-- 부모요소 box의 height는 언제나 자식 요소 box 높이를 감싸지 않음. -->
        <!-- 블럭요소안에 다른 블럭요소가 있다면 부모가 자식을 온전히(패딩,마진까지 포함) 감쌈. -->
         <div style="border: 1px dotted blue;"> 
            <!-- 부모 -->
            <p style=margin: 10px;"padding: 20px;">
                <!-- 자식 -->
                Hello
                
            </p>
         </div>
         <hr>

         <!-- 2.블럭요소안에 인라인요소가 있다면 부모가 자식을 온전히 감싸지 않음.(마진 , 패딩 제외) -->
          <div style="background-color: khaki;border:1px dotted blue">
            <a href="" style="padding: 10px;margin:10px;">naver</a>
            <!-- 인라인블럭은 적용됨 -->
             <input type="text" style="padding:10px;margin: 10px;">
          </div>
    
</body>
</html>
