<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sub menu</title>
    <style>
        *{margin:0; padding: 0}
        /* 모든 요소 마진 없음.  */
        ul{list-style: none;}

        nav{
            height: 50px;
            background-color: lightgreen;
        }

        nav ul.menu>li{
            display: inline-block;
            /* 인라인으로 하면 width 안먹으니 인라인블락으로하자. */
            border: 1px solid blue;
            padding: 5px 10px;
            margin: 10px;
        }

        nav ul.submenu{
            border: 1px dotted red;
            display: none;
            /* 경계가 안보이게 */

            position: absolute;
        }

        nav li.menu_item:hover .submenu{
            /* hover 됬을 때만 그때 자손 */
            display: block;
        }


    </style>
</head>
<body>
    <nav>
        <ul class="menu">
           <li class="menu_item">
            HOME
            <ul class="submenu">
                <li>111</li>
                <li>222</li>
                <li>333</li>
            </ul>

           </li>
            <li class="menu_item">
                SERVICE

                <ul class="submenu">
                    <li>222</li>
                    <li>222</li>
                    <li>2222</li>
                </ul>
            </li>
             <li class="menu_item">
                CONTACT
                <ul class="submenu">
                    <li>3333</li>
                    <li>3333</li>
                    <li>3333</li>
                </ul>
            </li>
        </ul>
    </nav>
</body>
</html>
