<!DOCTYPE html>
<html>
<!-- html:5 --> 
 <!-- 이거를 누르면 뷰포트 옵션이 동작함.  -->
    <head>
        <meta charset="utf-8">
        <title>viewport </title>

        <!-- 뷰포트 : 웹 브라우저가 화면을 그려내는 가상의 영역 -->
        <!-- 데스크탑 브라우저는 창의 크기에 따라 너비가 맞추어 변경됨. -->
        <!-- 모바일 브라우저는 디바이스의 크기와 상관없이 무조건 980px로 너비를 인식함. 그렇기에 css로 적용한 너비가 다르게 보여짐. (작게 보임) -->

        <!-- 그래서 모바일 UI를 제작할때는 반드시 viewport를 설정해 줘야 함. -->
        <!-- 메타데이타에 넣음. -->
        <!-- <meta name="viewport" content="width=400, initial-scale=1.0"> -->
        <!-- <meta name="viewport" content="width=600, initial-scale=1.0"> -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- 실제 디바이스와 상관없이 그냥 width를 400으로 고정 -->
        <!-- 모바일 사용할때 뷰포트 필수 -->

    </head>
    <body>
        <h2>View Port Test</h2>
        <p>this is viewport test page.</p>
        <img src="../Day06/image/computer.png" alt="computer image" style="width: 200px; border:1px dotted red">
        <!-- inline 스타일  -->

    </body>
</html>
