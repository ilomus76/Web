<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 웹 디자인</title>

    <style>
        *{padding: 0px; margin: 0px;}
        /* 거의 모든 사이트에서 사용 . 마진 하나도 안주고 사용 */

        #wrap{
            width: 90%;
            margin: 0px auto;
            /* 가운데 정렬 */
            border: 4px solid black;
            font-size : 0px; 
            /* 글씨가 전부 안보임.  */
            /* div 사이에 빈 간격을 없애기 위햇 사용. div의 태그를 작업할때 엔터를 치면 띄어쓰기가 되니 font size를 0으로 해서 업애버림. */
            /* 그러니 모든 폰트가 안보이게 되는데 그것을 더 밑의 개별 상속자에서 다시 16px로 설정함.  */
        }

        #wrap div{
            display: inline-block;
            /* 옆으로 배치하기 위해 */
            height: 100px;
            font-size : 16px; 
        }

        #wrap div:first-child{background-color: aqua;}
        #wrap div:nth-child(2){background-color: lightgreen;}
        #wrap div:nth-child(3){background-color: orange;}
        #wrap div:nth-child(4){background-color: indigo;}
        #wrap div:last-child{background-color: yellow;}

        /* 5개의 영역을 브라우저의 너비에 따라 반응형으로 배치하기 */
        /* 작업은 모바일 우선으로.. 작은 사이즈 부터 작성하는 것이 일반적임. */
        /* @media screen  */
        /* (1) 모바일 환경일때.. 최소 너비 320px 이상 */
        @media all and (min-width:320px){
            #wrap div{ width:100%;} 
            /* 한줄에 하나씩 */
        }

        /* (2) 태블릿 환경일때.. 600px 이상일때 */
        @media all and (min-width: 600px){
            #wrap div { width: 50%}
            #wrap div:last-child{width:100%}
        }

        /* (3) 데스크탑의 환경일때.. 800px 이상 */
        @media all and (min-width: 800px){
            #wrap div{width:20%;}
            /* 개발 상속자가 더 우선순위가 높음 */
            #wrap div:last-child{width:20%;}
        }
    </style>
</head>
<body>
    <!-- 엔터는 브라우저에서 띄어쓰기임. -->
    <div id="wrap">
        <div>aa</div>
        <div>bb</div>
        <div>cc</div>
        <div>dd</div>
        <div>ee</div>
    </div>
</body>
</html>
