<!-- 무료 아이콘 이미지 제공 사이트 : flaticon -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile UI ex</title>
    <!-- 외부스타일시트 -->
     <link rel="stylesheet" href="./mobileUI.css">
</head>
<body>
    <div id="container">
        <!-- 덩어리 -->
         <div class="toolbar">
            <img class="toolbar-img" src="./image/arrow.png" alt="back arrow">
            <button class="toolbar-btn">문의하기</button>

         </div>
         <h2>
            <span class="blue">2026년 기준으로</span>본인이 해당하는 조건이 있다면 모두 골라주세요.
         </h2>

         <div class="option-container">
            <div class="option">
                <img src="./image/ring.png" alt="배우자">
                <p>배우자가 있어요</p>
            </div>
            <!-- 띄어쓰기를 통해 여려개의 클래스명 지정 가능!! -->
            <div class="option selected">
                <!-- 클래스 명을 두개 줄수 있다. 띄어쓰기만큼 클래스를 줄수 있다. -->
                <img src="./image/ring.png" alt="세대주">
                <p>주민등록상 세대주예요</p>
            </div>

            <div class="option">
                <img src="./image/ring.png" alt="장애인">
                <p>장애인 이예요</p>
            </div>
            <div class="option">
                <img src="./image/ring.png" alt="가족 중 장애인">
                <p>가족중에 장애인이 있어요</p>
            </div>
            <div class="option">
                <img src="./image/ring.png" alt="위탁아동">
                <p>위탁아동이 있어요.</p>
            </div>


         </div>

         <button class="next-btn">다음</button>
    
    </div>

    
</body>
</html>
