<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>overflow</title>
        <style>
            .aaa p{
                /* 클래스 명이 aaa인 친구 */
                /* 자손이 p */

                background-color: lightgreen;
                width: 200px;
                height: 50px;

            }

            .aaa{
                border:2px solid black;
                width:300px;
                height: 100px;

                overflow: visible;
                /* default */
                overflow: hidden;
                /* 요소 밖까지 안보이게 그래서 잘림. */
                overflow:scroll;
                /* 무조건 스크롤 바가 생김.  */
                overflow: auto;
                /* 필요하면 만들고 필요없으면 스크롤 만들지 마...*/
            }
        </style>
    </head>
    <body>
        <div class="aaa">
            <p >block #1</p>
            <p>block #2</p>
            <p>block #3</p>
            <p>block #4</p>
            <p>block #5</p>
        </div>
    </body>
</html>
