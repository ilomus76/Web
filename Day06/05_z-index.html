<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>z-index</title>
        <style>
            div{
                width:100px;
                height:100px;
                border:1px solid black;

                position:absolute; 
                /* 다 겹침. */

            }

            #b1{
                background-color: blue;
                top:0px ; left:0px;
                z-index: 5;
            }
            #b2{
                background-color: yellow;
                top:30px ; left:30px;
                z-index: 3;
            }
            #b3{
                background-color: green;
                top:60px ; left:60px;
            }
        </style>
    </head>
    <body>
        <div id="b1">BOX#1</div>
        <div id="b2">BOX#2</div>
        <div id="b3">BOX#3</div>
    </body>
</html>
