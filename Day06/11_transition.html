<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>전환효과</title>
        <style>
            div{
                width: 100px;
                height: 50px;
                border: 1px solid black;
                background-color: yellow;

                /* width속성값이 바뀔대 전환효과주기  */
                transition: width 3s;
                /* width가 바뀔때 전환할거야.. 몇 초동안.. */
            }
            div:hover{
                width: 200px;
            }
        </style>
    </head>
    <body>
        <div>
            마우스를 올려보세요.
        </div>
    </body>
</html>
