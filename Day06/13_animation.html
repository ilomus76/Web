<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>animation test</title>

        <style>
            #aa{
                background-color: green;
                width: 50px;
                height: 50px;
                border-radius: 25px;
                position: absolute;
                /* fixed는 창의 좌상단 , abslution는 문서의 좌상단 */

                /* 애니메이션 적용 */
                animation-name: myanim;
                /* 에니메이션 이름. */
                /* 내가 만든 myanim에 애니메이션이 적용된다... */
                animation-name: bounce;
                animation-duration: 3s;
                /* animation-iteration-count: 5; */
                animation-iteration-count: infinite;
                /* 배너광고 효과에 좋다. 일반적으로는 자바스크립트로 함. */
                animation-timing-function: ease;
            }

            /* 애니메이션 장면들 만들기 */
            @keyframes myanim{
                0%{left: 0px; top:0px;} 
                /* 시작지점 */
                25%{left: 100px;top:50px;}
                50%{left:200px; top:0px;}
                75%{left:100px; top:100px;}
                100%{left:0px; top:0px;}
            }

            @keyframes bounce{
                0%, 100%{
                    bottom: 0px; left:0px;
                    animation-timing-function: ease-out;
                }
                50%{
                        bottom: 200px;
                        animation-timing-function: ease-in;
                    }
                
            }
        </style>
        
    </head>
    <body>
        <div id="aa"></div>
    </body>
</html>
