<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"></stop>
      <stop offset="100%" stop-color="#87CEEB"></stop>
    </linearGradient>

    <!-- Sun Glow -->
    <radialGradient id="sunGlow">
      <stop offset="0%" stop-color="#FFFACD" stop-opacity="1"></stop>
      <stop offset="70%" stop-color="#FFD700" stop-opacity="0.7"></stop>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Logo Gradient -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#D6F3FF"></stop>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#003366" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#skyGradient)"></rect>

  <!-- Sun Glow -->
  <circle cx="650" cy="90" r="90" fill="url(#sunGlow)"></circle>
  <circle cx="650" cy="90" r="40" fill="#FFD700"></circle>

  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="140" cy="90" rx="45" ry="20"></ellipse>
    <ellipse cx="180" cy="85" rx="40" ry="18"></ellipse>
    <ellipse cx="220" cy="95" rx="50" ry="22"></ellipse>

    <ellipse cx="520" cy="150" rx="50" ry="22"></ellipse>
    <ellipse cx="560" cy="145" rx="42" ry="18"></ellipse>
    <ellipse cx="600" cy="155" rx="48" ry="20"></ellipse>
  </g>

  <!-- Airplane Contrail -->
  <path d="M180 220 Q350 170 540 130" stroke="white" stroke-width="5" opacity="0.5" fill="none" stroke-linecap="round"></path>

  <!-- Airplane -->
  <g transform="translate(520,130) rotate(-15)">
    <path d="
      M0 0
      L40 8
      L80 0
      L40 -8
      Z" fill="#F5F7FA"></path>

    <rect x="15" y="-3" width="45" height="6" fill="#E2E8F0"></rect>

    <polygon points="25,-3 10,-20 30,-6" fill="#CBD5E1"></polygon>
    <polygon points="25,3 10,20 30,6" fill="#CBD5E1"></polygon>
    <polygon points="60,-3 75,-15 65,-3" fill="#CBD5E1"></polygon>
    <polygon points="60,3 75,15 65,3" fill="#CBD5E1"></polygon>
  </g>

  <!-- Science-themed orbital accents -->
  <g opacity="0.35" stroke="#FFFFFF" fill="none">
    <ellipse cx="120" cy="300" rx="45" ry="15"></ellipse>
    <ellipse cx="120" cy="300" rx="15" ry="45" transform="rotate(30 120 300)"></ellipse>
    <circle cx="120" cy="300" r="4" fill="#FFFFFF"></circle>
  </g>

  <g opacity="0.25" fill="#FFFFFF">
    <circle cx="95" cy="285" r="3"></circle>
    <circle cx="150" cy="315" r="3"></circle>
    <circle cx="110" cy="340" r="2"></circle>
  </g>

  <!-- Logo Text -->
  <text x="400" y="320" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="url(#logoGradient)" filter="url(#shadow)" letter-spacing="1">
    Future in Science
  </text>

  <!-- Tagline Line -->
  <line x1="240" y1="340" x2="560" y2="340" stroke="white" stroke-opacity="0.5" stroke-width="2"></line>

</svg>