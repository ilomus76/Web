<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071A3D"></stop>
      <stop offset="100%" stop-color="#1E3A8A"></stop>
    </linearGradient>

    <radialGradient id="photon">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="40%" stop-color="#60A5FA"></stop>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg1)"></rect>

  <!-- Left Image Area -->
  <rect x="0" y="0" width="320" height="400" fill="#0F172A"></rect>

  <circle cx="160" cy="200" r="80" fill="none" stroke="#60A5FA" stroke-width="3"></circle>
  <ellipse cx="160" cy="200" rx="120" ry="40" fill="none" stroke="#93C5FD" stroke-width="2"></ellipse>
  <ellipse cx="160" cy="200" rx="40" ry="120" fill="none" stroke="#93C5FD" stroke-width="2"></ellipse>

  <circle cx="160" cy="200" r="12" fill="#FFFFFF"></circle>

  <text x="160" y="340" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="700" font-family="Noto Sans KR, sans-serif">
    양자역학
  </text>

  <!-- Photon Effect -->
  <circle cx="500" cy="180" r="90" fill="url(#photon)"></circle>
  <circle cx="560" cy="140" r="40" fill="url(#photon)"></circle>
  <circle cx="620" cy="220" r="60" fill="url(#photon)"></circle>

  <text x="540" y="220" text-anchor="middle" fill="#FFFFFF" font-size="54" font-weight="700" font-family="Segoe UI, Arial, sans-serif">
    photon physics
  </text>
</svg>