<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"></stop>
      <stop offset="100%" stop-color="#164E63"></stop>
    </linearGradient>

    <linearGradient id="scienceGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="100%" stop-color="#FFFFFF"></stop>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg2)"></rect>

  <!-- Left Area -->
  <rect x="0" y="0" width="320" height="400" fill="#083344"></rect>

  <!-- Atom -->
  <g transform="translate(160,180)">
    <ellipse rx="90" ry="30" fill="none" stroke="#67E8F9" stroke-width="3"></ellipse>
    <ellipse rx="30" ry="90" fill="none" stroke="#67E8F9" stroke-width="3"></ellipse>
    <ellipse rx="90" ry="30" transform="rotate(45)" fill="none" stroke="#67E8F9" stroke-width="3"></ellipse>

    <circle r="12" fill="#FFFFFF"></circle>
  </g>

  <text x="160" y="340" text-anchor="middle" fill="#FFFFFF" font-size="42" font-weight="700" font-family="Noto Sans KR, sans-serif">
    과학
  </text>

  <!-- Right Text -->
  <text x="560" y="220" text-anchor="middle" fill="url(#scienceGlow)" font-size="72" font-weight="700" font-family="Segoe UI, Arial, sans-serif">
    science
  </text>

  <!-- Decorative Dots -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="460" cy="120" r="4"></circle>
    <circle cx="520" cy="90" r="3"></circle>
    <circle cx="620" cy="110" r="5"></circle>
    <circle cx="700" cy="150" r="3"></circle>
    <circle cx="650" cy="280" r="4"></circle>
    <circle cx="500" cy="300" r="3"></circle>
  </g>
</svg>